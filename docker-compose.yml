services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vetmanager
      POSTGRES_USER: ${POSTGRES_USER:-vetmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    volumes:
      - /var/lib/vetmanager-postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c max_connections=50
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c wal_buffers=4MB
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vetmanager} -d vetmanager"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - production

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    profiles:
      - production

  mcp:
    build:
      context: .
      target: production
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: vetmanager-mcp
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PATH: ${MCP_PATH:-/mcp}
      PORT: 8000
      SITE_BASE_URL: ${SITE_BASE_URL:-}
      STORAGE_ENCRYPTION_KEY: ${STORAGE_ENCRYPTION_KEY:-}
      WEB_SESSION_SECRET: ${WEB_SESSION_SECRET:-}
      FEEDBACK_FINGERPRINT_PEPPER: ${FEEDBACK_FINGERPRINT_PEPPER:-}
      METRICS_AUTH_TOKEN: ${METRICS_AUTH_TOKEN:-}
      REDIS_URL: ${REDIS_URL:-}
      RATE_LIMIT_REQUIRE_REDIS: ${RATE_LIMIT_REQUIRE_REDIS:-}
      RATE_LIMIT_REDIS_SOCKET_TIMEOUT_SECONDS: ${RATE_LIMIT_REDIS_SOCKET_TIMEOUT_SECONDS:-}
      RATE_LIMIT_REDIS_OPERATION_TIMEOUT_SECONDS: ${RATE_LIMIT_REDIS_OPERATION_TIMEOUT_SECONDS:-}
      RATE_LIMIT_REDIS_HEALTH_CHECK_INTERVAL_SECONDS: ${RATE_LIMIT_REDIS_HEALTH_CHECK_INTERVAL_SECONDS:-}
    ports:
      - "127.0.0.1:${PORT:-8000}:8000"
    volumes:
      - .:/app
      - mcp-data:/app/data  # SQLite fallback for local dev
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    cpus: '0.5'
    mem_limit: 384m
    environment:
      METRICS_AUTH_TOKEN: ${METRICS_AUTH_TOKEN:-}
    command:
      - /bin/sh
      - -c
      - |
        umask 077
        printenv METRICS_AUTH_TOKEN > /tmp/metrics_bearer_token
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=30d \
          --storage.tsdb.retention.size=1GB \
          --web.console.libraries=/usr/share/prometheus/console_libraries \
          --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      mcp:
        condition: service_started
    profiles:
      - production
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    cpus: '0.5'
    mem_limit: 256m
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/vetmanager-overview.json
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    profiles:
      - production
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  test:
    build:
      context: .
      target: test
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: vetmanager-mcp-test
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      STORAGE_ENCRYPTION_KEY: ${STORAGE_ENCRYPTION_KEY:-}
      SITE_BASE_URL: ${SITE_BASE_URL:-}
      WEB_SESSION_SECRET: ${WEB_SESSION_SECRET:-}
      FEEDBACK_FINGERPRINT_PEPPER: ${FEEDBACK_FINGERPRINT_PEPPER:-}
      TEST_DOMAIN: ${TEST_DOMAIN:-}
      TEST_API_KEY: ${TEST_API_KEY:-}
      TEST_USER_TOKEN: ${TEST_USER_TOKEN:-}
      TEST_USER_TOKEN_BASE_URL: ${TEST_USER_TOKEN_BASE_URL:-}
      TEST_USER_LOGIN: ${TEST_USER_LOGIN:-}
      TEST_USER_PASSWORD: ${TEST_USER_PASSWORD:-}
    volumes:
      - .:/app
    user: "${UID:-1000}:${GID:-1000}"
    command: >
      sh -c "python scripts/run_default_test_suite.py"
    profiles:
      - test

volumes:
  mcp-data:
  prometheus-data:
  grafana-data:
