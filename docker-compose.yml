services:
  mcp:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: vetmanager-mcp
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    stdin_open: true
    tty: true
    # MCP runs over stdio — no ports needed for local use.
    # For HTTP transport, uncomment:
    # ports:
    #   - "8000:8000"
    volumes:
      - .:/app
    user: "${UID:-1000}:${GID:-1000}"

  test:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: vetmanager-mcp
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      TEST_DOMAIN: ${TEST_DOMAIN:-}
      TEST_API_KEY: ${TEST_API_KEY:-}
    volumes:
      - .:/app
    user: "${UID:-1000}:${GID:-1000}"
    command: >
      sh -c "pip install --quiet respx pytest-asyncio &&
             python -m pytest tests/ -v"
    profiles:
      - test
