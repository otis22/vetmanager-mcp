services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vetmanager
      POSTGRES_USER: ${POSTGRES_USER:-vetmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    volumes:
      - /var/lib/vetmanager-postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c max_connections=50
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c wal_buffers=4MB
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vetmanager} -d vetmanager"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
      - production

  mcp:
    build:
      context: .
      target: production
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: vetmanager-mcp
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PATH: ${MCP_PATH:-/mcp}
      PORT: ${PORT:-8000}
      STORAGE_ENCRYPTION_KEY: ${STORAGE_ENCRYPTION_KEY:-}
      WEB_SESSION_SECRET: ${WEB_SESSION_SECRET:-}
    ports:
      - "127.0.0.1:${PORT:-8000}:${PORT:-8000}"
    volumes:
      - .:/app
      - mcp-data:/app/data  # SQLite fallback for local dev
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  test:
    build:
      context: .
      target: test
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: vetmanager-mcp-test
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-WARNING}
      STORAGE_ENCRYPTION_KEY: ${STORAGE_ENCRYPTION_KEY:-}
      WEB_SESSION_SECRET: ${WEB_SESSION_SECRET:-}
      TEST_DOMAIN: ${TEST_DOMAIN:-}
      TEST_API_KEY: ${TEST_API_KEY:-}
      TEST_USER_TOKEN: ${TEST_USER_TOKEN:-}
      TEST_USER_TOKEN_BASE_URL: ${TEST_USER_TOKEN_BASE_URL:-}
      TEST_USER_LOGIN: ${TEST_USER_LOGIN:-}
      TEST_USER_PASSWORD: ${TEST_USER_PASSWORD:-}
    volumes:
      - .:/app
    user: "${UID:-1000}:${GID:-1000}"
    command: >
      sh -c "python scripts/run_default_test_suite.py"
    profiles:
      - test

volumes:
  mcp-data:
