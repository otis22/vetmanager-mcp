        - generic [ref=e36]: Интеграция подключается один раз на уровне аккаунта клиники, а доступ выдаётся через service token.
  - generic [ref=e37]:
    - heading "Что такое MCP?" [level=3] [ref=e38]
    - paragraph [ref=e39]: "MCP (Model Context Protocol) — открытый стандарт, который позволяет AI-ассистентам безопасно подключаться к внешним системам. Этот сервис — MCP-мост к Vetmanager: ваша клиника подключается один раз, а дальше команда получает данные через привычный AI-интерфейс, без необходимости переключаться между экранами Vetmanager."
  - generic [ref=e40]:
    - article [ref=e41]:
      - heading "Что получает клиника" [level=3] [ref=e42]
      - paragraph [ref=e43]: "Сервис помогает быстрее отвечать на ежедневные вопросы клиники: кто записан на сегодня, какая история у пациента, есть ли долг у клиента, что осталось на складе и какие сотрудники свободны или загружены."
      - list [ref=e44]:
        - listitem [ref=e45]: Врач быстрее получает историю пациента, прививки, назначения и последние приёмы.
        - listitem [ref=e46]: Администратор быстрее проверяет записи, клиентов, задолженности и расписание.
        - listitem [ref=e47]: Руководитель быстрее смотрит финансы, склад и общую картину по клинике.
        - listitem [ref=e48]: Доступ настраивается один раз, а дальше команда работает через AI-ассистента и service token.
    - article [ref=e49]:
      - heading "Для кого сервис" [level=3] [ref=e50]
      - paragraph [ref=e51]: Сервис сделан для ветврачей, администраторов и руководителей клиник, которым нужен быстрый доступ к данным Vetmanager через AI-ассистента.
      - list [ref=e52]:
        - listitem [ref=e53]:
          - strong [ref=e54]: "Ветврач:"
          - text: история пациента, прививки, медицинские карты, последние визиты.
        - listitem [ref=e55]:
          - strong [ref=e56]: "Администратор:"
          - text: записи, клиенты, контакты, сотрудники, задолженности.
        - listitem [ref=e57]:
          - strong [ref=e58]: "Руководитель:"
          - text: финансы, склад, выручка, сотрудники и общая операционная картина.
    - article [ref=e59]:
      - heading "Как начать работу" [level=3] [ref=e60]
      - generic [ref=e61]:
        - paragraph [ref=e64]:
          - strong [ref=e65]: Зарегистрироваться
          - text: Создать аккаунт клиники и открыть личный кабинет.
        - paragraph [ref=e68]:
          - strong [ref=e69]: Подключить Vetmanager
          - text: Указать домен клиники и настроить безопасную авторизацию один раз.
        - paragraph [ref=e72]:
          - strong [ref=e73]: Работать через AI-ассистента
          - text: Задавать вопросы по клиентам, пациентам, приёмам, финансам и складу в одном интерфейсе.
    - article [ref=e74]:
      - heading "Какие вопросы можно задавать" [level=3] [ref=e75]
      - paragraph [ref=e76]: Сервис рассчитан на повседневные вопросы, которые обычно требуют нескольких переходов по Vetmanager или помощи администратора.
      - list [ref=e77]:
        - listitem [ref=e78]: Покажи записи на сегодня и ближайшие приёмы по врачам.
        - listitem [ref=e79]: Найди клиента и покажи историю обращений его питомца.
        - listitem [ref=e80]: Какие пациенты давно не приходили на повторный приём?
        - listitem [ref=e81]: Покажи должников и суммы задолженности.
        - listitem [ref=e82]: Какие товары заканчиваются на складе?
        - listitem [ref=e83]: Покажи выручку и последние оплаты.
      - paragraph [ref=e84]: Регистрация вынесена в главный сценарий страницы, потому что именно с неё начинается настройка клиники и безопасного доступа команды.
    - article [ref=e85]:
      - heading "Технический блок" [level=3] [ref=e86]
      - paragraph [ref=e87]: Для технической команды сервис остаётся совместимым с MCP-клиентами и использует bearer-only runtime, но эти детали не нужны для старта работы клиники и спрятаны ниже как вторичный слой страницы.
      - paragraph [ref=e88]:
        - text: "Формат подключения:"
        - code [ref=e89]: "Authorization: Bearer <service_token>"
        - text: .
      - generic [ref=e90]: "{ \"mcpServers\": { \"vetmanager\": { \"url\": \"http://localhost:8000/mcp\", \"headers\": { \"Authorization\": \"Bearer vm_st_your_service_token\" } } } }"
