  - generic [ref=e15]:
    - generic [ref=e16]:
      - paragraph [ref=e17]: Для ветклиник и врачей
      - heading "Данные клиники и команды по запросу за секунды." [level=2] [ref=e18]
      - paragraph [ref=e19]: "Сервис для ветврачей, администраторов и руководителей клиник помогает быстрее получать данные из Vetmanager через AI-ассистента: по клиентам, пациентам, приёмам, финансам и складу. Без ручного поиска по разделам и без передачи секретов клиники в каждое подключение."
      - paragraph [ref=e20]: Сервис не сохраняет бизнес-данные из Vetmanager для постоянного хранения. Он хранит только технические данные интеграции и сервисные bearer-метаданные, необходимые для авторизации и работы MCP runtime.
      - paragraph [ref=e21]: "Если выбран режим авторизации через Vetmanager login/password, логин и пароль Vetmanager не сохраняются: они нужны только для получения user token. При смене пароля в Vetmanager такой token может стать невалидным, и потребуется повторная авторизация."
      - generic [ref=e22]:
        - link "Зарегистрироваться" [ref=e23] [cursor=pointer]:
          - /url: /register
        - link "Посмотреть примеры" [ref=e24] [cursor=pointer]:
          - /url: "#examples"
      - paragraph [ref=e25]:
        - text: Уже зарегистрированы?
        - link "Войти в кабинет" [ref=e26] [cursor=pointer]:
          - /url: /login
    - generic [ref=e27]:
      - generic [ref=e28]:
        - strong [ref=e29]: Клиенты и пациенты
        - generic [ref=e30]: Быстрый доступ к карточкам, истории и последним обращениям без ручной навигации по системе.
      - generic [ref=e31]:
        - strong [ref=e32]: Приёмы, финансы, склад
        - generic [ref=e33]: Записи на сегодня, долги клиентов, выручка и остатки доступны через один AI-интерфейс.
      - generic [ref=e34]:
