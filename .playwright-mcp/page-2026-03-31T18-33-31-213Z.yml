  - generic [ref=e33]:
    - heading "Что такое MCP?" [level=3] [ref=e34]
    - paragraph [ref=e35]: "MCP (Model Context Protocol) — открытый стандарт, который позволяет AI-ассистентам безопасно подключаться к внешним системам. Этот сервис — MCP-мост к Vetmanager: ваша клиника подключается один раз, а дальше команда получает данные через привычный AI-интерфейс, без необходимости переключаться между экранами Vetmanager."
  - generic [ref=e36]:
    - article [ref=e37]:
      - heading "Что получает клиника" [level=3] [ref=e38]
      - paragraph [ref=e39]: "Сервис помогает быстрее отвечать на ежедневные вопросы клиники: кто записан на сегодня, какая история у пациента, есть ли долг у клиента, что осталось на складе и какие сотрудники свободны или загружены."
      - list [ref=e40]:
        - listitem [ref=e41]: Врач быстрее получает историю пациента, прививки, назначения и последние приёмы.
        - listitem [ref=e42]: Администратор быстрее проверяет записи, клиентов, задолженности и расписание.
        - listitem [ref=e43]: Руководитель быстрее смотрит финансы, склад и общую картину по клинике.
        - listitem [ref=e44]: Доступ настраивается один раз, а дальше команда работает через AI-ассистента и service token.
    - article [ref=e45]:
      - heading "Для кого сервис" [level=3] [ref=e46]
      - paragraph [ref=e47]: Сервис сделан для ветврачей, администраторов и руководителей клиник, которым нужен быстрый доступ к данным Vetmanager через AI-ассистента.
      - list [ref=e48]:
        - listitem [ref=e49]:
          - strong [ref=e50]: "Ветврач:"
          - text: история пациента, прививки, медицинские карты, последние визиты.
        - listitem [ref=e51]:
          - strong [ref=e52]: "Администратор:"
          - text: записи, клиенты, контакты, сотрудники, задолженности.
        - listitem [ref=e53]:
          - strong [ref=e54]: "Руководитель:"
          - text: финансы, склад, выручка, сотрудники и общая операционная картина.
    - article [ref=e55]:
      - heading "Как начать работу" [level=3] [ref=e56]
      - generic [ref=e57]:
        - paragraph [ref=e60]:
          - strong [ref=e61]: Зарегистрироваться
          - text: Создать аккаунт клиники и открыть личный кабинет.
        - paragraph [ref=e64]:
          - strong [ref=e65]: Подключить Vetmanager
          - text: Указать домен клиники и настроить безопасную авторизацию один раз.
        - paragraph [ref=e68]:
          - strong [ref=e69]: Работать через AI-ассистента
          - text: Задавать вопросы по клиентам, пациентам, приёмам, финансам и складу в одном интерфейсе.
    - article [ref=e70]:
      - heading "Какие вопросы можно задавать" [level=3] [ref=e71]
      - paragraph [ref=e72]: Сервис рассчитан на повседневные вопросы, которые обычно требуют нескольких переходов по Vetmanager или помощи администратора.
      - list [ref=e73]:
        - listitem [ref=e74]: Покажи записи на сегодня и ближайшие приёмы по врачам.
        - listitem [ref=e75]: Найди клиента и покажи историю обращений его питомца.
        - listitem [ref=e76]: Какие пациенты давно не приходили на повторный приём?
        - listitem [ref=e77]: Покажи должников и суммы задолженности.
        - listitem [ref=e78]: Какие товары заканчиваются на складе?
        - listitem [ref=e79]: Покажи выручку и последние оплаты.
      - paragraph [ref=e80]: Регистрация вынесена в главный сценарий страницы, потому что именно с неё начинается настройка клиники и безопасного доступа команды.
    - article [ref=e81]:
      - heading "Технический блок" [level=3] [ref=e82]
      - paragraph [ref=e83]: Для технической команды сервис остаётся совместимым с MCP-клиентами и использует bearer-only runtime, но эти детали не нужны для старта работы клиники и спрятаны ниже как вторичный слой страницы.
      - paragraph [ref=e84]:
        - text: "Формат подключения:"
        - code [ref=e85]: "Authorization: Bearer <service_token>"
        - text: .
      - generic [ref=e86]: "{ \"mcpServers\": { \"vetmanager\": { \"url\": \"http://localhost:8000/mcp\", \"headers\": { \"Authorization\": \"Bearer vm_st_your_service_token\" } } } }"
