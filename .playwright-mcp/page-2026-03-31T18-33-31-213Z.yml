      - paragraph [ref=e13]: Для ветклиник и врачей
      - heading "Данные клиники и команды по запросу за секунды." [level=2] [ref=e14]
      - paragraph [ref=e15]: "Сервис для ветврачей, администраторов и руководителей клиник помогает быстрее получать данные из Vetmanager через AI-ассистента: по клиентам, пациентам, приёмам, финансам и складу. Без ручного поиска по разделам и без передачи секретов клиники в каждое подключение."
      - paragraph [ref=e16]: Сервис не сохраняет бизнес-данные из Vetmanager для постоянного хранения. Он хранит только технические данные интеграции и сервисные bearer-метаданные, необходимые для авторизации и работы MCP runtime.
      - paragraph [ref=e17]: "Если выбран режим авторизации через Vetmanager login/password, логин и пароль Vetmanager не сохраняются: они нужны только для получения user token. При смене пароля в Vetmanager такой token может стать невалидным, и потребуется повторная авторизация."
      - generic [ref=e18]:
        - link "Зарегистрироваться" [ref=e19] [cursor=pointer]:
          - /url: /register
        - link "Посмотреть примеры" [ref=e20] [cursor=pointer]:
