name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fast:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --build-arg UID=1001 --build-arg GID=1001 -t vetmanager-mcp .

      - name: Run fast contour
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -u 1001:1001 \
            vetmanager-mcp \
            python scripts/run_fast_test_suite.py

  default:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --build-arg UID=1001 --build-arg GID=1001 -t vetmanager-mcp .

      - name: Run default contour
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -u 1001:1001 \
            vetmanager-mcp \
            python scripts/run_default_test_suite.py
