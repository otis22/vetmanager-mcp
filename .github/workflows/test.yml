name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --build-arg UID=1001 --build-arg GID=1001 -t vetmanager-mcp .

      - name: Run unit + mock e2e tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -u 1001:1001 \
            vetmanager-mcp \
            python -m pytest tests/test_client_multitenancy.py tests/test_e2e_mock.py -v
