[pytest]
asyncio_mode = auto
testpaths = tests
markers =
    browser: browser-level regression and happy-path tests running via Playwright
    security: targeted security regression tests for auth, audit, proxy, and host-validation invariants
    real_api: opt-in tests against real Vetmanager API credentials and contour
    real_browser: opt-in browser tests against real Vetmanager credentials and contour
